name: Claude Code Bug Fix

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

jobs:
  # Auto-fix when bug-report label is added (from Cloud Function)
  auto-fix:
    if: github.event_name == 'issues' && github.event.label.name == 'bug-report'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-fix bug with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "bug-report"
          claude_args: "--model claude-opus-4-6 --max-turns 30"
          show_full_output: true
          prompt: |
            Fix the bug described in this issue. Read the issue title and body for details.

            The app is a SwiftUI iOS family hub app (iOS 17+). Key conventions:
            - @Observable ViewModels (not ObservableObject), @Bindable in views
            - FirestoreService is the central data layer
            - Dark mode glassmorphism design — see docs/DESIGN_SYSTEM.md
            - Week starts Monday

            Key paths: Models (Choo/Models/), ViewModels (Choo/ViewModels/), Views (Choo/Views/), Services (Choo/Services/), Web app (choo-web/src/)

            Create a pull request with the fix.

  # Also respond to @claude mentions in comments for follow-up
  comment-fix:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Respond to Claude mention
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --max-turns 30"
          show_full_output: true
          trigger_phrase: "@claude"
