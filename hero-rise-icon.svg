<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <radialGradient id="glossLg" cx="34%" cy="28%" r="52%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.98)"/>
      <stop offset="35%" stop-color="rgba(240,235,255,0.88)"/>
      <stop offset="70%" stop-color="rgba(200,185,235,0.65)"/>
      <stop offset="100%" stop-color="rgba(160,140,210,0.48)"/>
    </radialGradient>
    <radialGradient id="glossMd" cx="34%" cy="28%" r="52%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="35%" stop-color="rgba(235,230,252,0.84)"/>
      <stop offset="100%" stop-color="rgba(155,135,205,0.42)"/>
    </radialGradient>
    <radialGradient id="glossSm" cx="34%" cy="28%" r="52%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.90)"/>
      <stop offset="35%" stop-color="rgba(230,225,248,0.78)"/>
      <stop offset="100%" stop-color="rgba(148,128,200,0.36)"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  
  <!-- Glow source -->
  <ellipse cx="105" cy="215" rx="35" ry="18" fill="rgba(196,181,253,0.12)"/>
  
  <!-- Hero bubble (Alex / "Bubble") -->
  <circle cx="80" cy="54" r="44" fill="url(#glossLg)" filter="url(#shadow)"/>
  <ellipse cx="64" cy="38" rx="17" ry="10" fill="rgba(255,255,255,0.56)" transform="rotate(-28 64 38)"/>
  <path d="M114,26 A44,44 0 0,1 114,82" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  
  <!-- Dad bubble -->
  <circle cx="148" cy="92" r="30" fill="url(#glossMd)" filter="url(#shadow)"/>
  <ellipse cx="138" cy="80" rx="11" ry="6.5" fill="rgba(255,255,255,0.48)" transform="rotate(-28 138 80)"/>
  
  <!-- Kid 1 -->
  <circle cx="120" cy="148" r="22" fill="url(#glossSm)" filter="url(#shadow)"/>
  <ellipse cx="113" cy="140" rx="8" ry="5" fill="rgba(255,255,255,0.42)" transform="rotate(-28 113 140)"/>
  
  <!-- Kid 2 — just emerging -->
  <circle cx="68" cy="168" r="16" fill="url(#glossSm)" filter="url(#shadow)"/>
  <ellipse cx="63" cy="162" rx="6" ry="3.5" fill="rgba(255,255,255,0.36)" transform="rotate(-28 63 162)"/>
</svg>
